name: Deploy to MD1

on:
  push:
    branches:
      - master


  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      
    - name: Login to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.PAT_TOKEN }}
        
    - name: Build and push Docker image
      uses: docker/build-push-action@v4
      with:
        context: .
        push: true
        tags: ghcr.io/${{ github.repository }}/listing-scrapers:latest
      env:
        GOOGLE_GENERATIVE_AI_API_KEY: ${{vars.GOOGLE_GENERATIVE_AI_API_KEY}}
        OPENAI_API_KEY:  ${{vars.OPENAI_API_KEY}}
        DB_HOST:  ${{vars.DB_HOST}}
        DB_PORT:  ${{vars.DB_PORT}}
        DB_DRIVER:  ${{vars.DB_DRIVER}}
        DB_CONNECTION:  ${{vars.DB_CONNECTION}}
        DB_DATABASE:  ${{vars.DB_DATABASE}}
        DB_USERNAME:  ${{vars.DB_USERNAME}}
        DB_PASSWORD:  ${{vars.DB_PASSWORD}}
        TRM_STAFF_USER_ID:  ${{vars.TRM_STAFF_USER_ID}}
        OPENAI_MODEL:  ${{vars.OPENAI_MODEL}}
        EXPLORE_TALENT_API_KEY:  ${{vars.EXPLORE_TALENT_API_KEY}}
        TZ:  ${{vars.TZ}}
        SEARCH_BASE_URL:  ${{vars.SEARCH_BASE_URL}}

    
    - name: Deploy to Server
      uses: appleboy/ssh-action@v1
      with:
        host: md1.trmx.cc
        username: aakar
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          cd /
          echo "Changing to root user"
          echo ${{ secrets.SUDO_PASS_MDX }} | sudo -S su

          echo "Stop listing-scrapers"
          docker stop ghcr.io/${{ github.repository }}/listing-scrapers:latest

          echo "Remove listing-scrapers"
          docker rm ghcr.io/${{ github.repository }}/listing-scrapers:latest

          echo "Logging into GitHub Container Registry"
          echo "${{ secrets.PAT_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

          echo "Pulling the image from GHCR"
          docker pull ghcr.io/${{ github.repository }}/listing-scrapers:latest

          echo "Running the updated code in detached mode."
          docker run -dit ghcr.io/${{ github.repository }}/listing-scrapers:latest
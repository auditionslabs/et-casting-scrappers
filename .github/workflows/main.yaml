name: Deploy to MD1

on:
  push:
    branches:
      - master


  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      
    - name: Login to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.PAT_TOKEN }}
        
    - name: Build and push Docker image
      uses: docker/build-push-action@v4
      with:
        context: .
        push: true
        tags: ghcr.io/${{ github.repository }}/listing-scrapers:latest
        
    - name: Deploy to Server
      uses: appleboy/ssh-action@v1
      with:
        host: md1.trmx.cc
        username: aakar
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          cd /
          echo "Changing to root user"
          sudo -S ${{ secrets.SUDO_PASS_MDX }} su

          echo "Stop listing-scrapers"
          docker stop ghcr.io/${{ github.repository }}/listing-scrapers:latest

          echo "Remove listing-scrapers"
          docker rm ghcr.io/${{ github.repository }}/listing-scrapers:latest

          echo "Logging into GitHub Container Registry"
          echo "${{ secrets.PAT_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

          echo "Pulling the image from GHCR"
          docker pull ghcr.io/${{ github.repository }}/listing-scrapers:latest

          echo "Running the updated code in detached mode."
          docker run -dit ghcr.io/${{ github.repository }}/listing-scrapers:latest
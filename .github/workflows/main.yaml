name: Deploy to MD1

on:
  push:
    branches:
      - master


  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      
    - name: Login to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.PAT_TOKEN }}
      
    - name: Create .env file
      run: |
        echo "GOOGLE_GENERATIVE_AI_API_KEY=${{vars.GOOGLE_GENERATIVE_AI_API_KEY}}" > .env
        echo "OPENAI_API_KEY=${{vars.OPENAI_API_KEY}}" >> .env
        echo "DB_HOST=${{vars.DB_HOST}}" >> .env
        echo "DB_PORT=${{vars.DB_PORT}}" >> .env
        echo "DB_DRIVER=${{vars.DB_DRIVER}}" >> .env
        echo "DB_CONNECTION=${{vars.DB_CONNECTION}}" >> .env
        echo "DB_DATABASE=${{vars.DB_DATABASE}}" >> .env
        echo "DB_USERNAME=${{vars.DB_USERNAME}}" >> .env
        echo "DB_PASSWORD=${{vars.DB_PASSWORD}}" >> .env
        echo "TRM_STAFF_USER_ID=${{vars.TRM_STAFF_USER_ID}}" >> .env
        echo "OPENAI_MODEL=${{vars.OPENAI_MODEL}}" >> .env
        echo "EXPLORE_TALENT_API_KEY=${{vars.EXPLORE_TALENT_API_KEY}}" >> .env
        echo "TZ=${{vars.TZ}}" >> .env
        echo "SEARCH_BASE_URL=${{vars.SEARCH_BASE_URL}}" >> .env
        echo "MELISEARCH_BASE_URL=${{vars.MELISEARCH_BASE_URL}}" >> .env
        echo "MELISEARCH_MASTER_KEY=${{vars.MELISEARCH_MASTER_KEY}}" >> .env
        echo "GOOGLE_MAPS_API_KEY=${{vars.GOOGLE_MAPS_API_KEY}}" >> .env

    - name: Build and push Docker image
      uses: docker/build-push-action@v4
      with:
        context: .
        push: true
        tags: ghcr.io/auditionslabs/et-casting-scrappers/listing-scrapers:latest
    
    - name: Deploy to Server
      uses: appleboy/ssh-action@v1
      with:
        host: md1.trmx.cc
        username: aakar
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          cd /
          echo "Changing to root user"
          echo ${{ secrets.SUDO_PASS_MDX }} | sudo -S su

          echo "Stop listing-scrapers"
          docker stop et-casting-scrappers

          echo "Remove listing-scrapers"
          docker rm et-casting-scrappers

          echo "Remove the image"
          docker image rm ghcr.io/${{ github.repository }}/listing-scrapers:latest || true

          echo "Logging into GitHub Container Registry"
          echo ${{ secrets.PAT_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin

          echo "Pulling the image from GHCR"
          docker pull ghcr.io/${{ github.repository }}/listing-scrapers:latest

          echo "Running the updated code in detached mode."
          docker run --name et-casting-scrappers -dit ghcr.io/${{ github.repository }}/listing-scrapers:latest 